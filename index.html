<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio Funcionando</title>
</head>
<body>
    <h1>Servicio OK</h1>
</body>
</html>

<script>
fetch('bot.php')
.then(response => {
    if (response.ok) {
        document.body.innerHTML += '<p>php.bot online</p>';
    } else {
        document.body.innerHTML += '<p>php.bot no encontrado</p>';
    }
})
.catch(() => {
    document.body.innerHTML += '<p>php.bot no encontrado</p>';
});
</script>
