<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio bot Telegram</title>
</head>
<body>
    <h1>Verificando bot.php</h1>
    <p id="status">Cargando...</p>

    <script>
        fetch('/bot.php')
            .then(response => {
                if (response.ok) {
                    document.getElementById('status').textContent = 'bot.php Online.';
                } else {
                    document.getElementById('status').textContent = 'bot.php inaccesible (status: ' + response.status + ').';
                }
            })
            .catch(error => {
                document.getElementById('status').textContent = 'bot.php inaccesible (error: ' + error.message + ').';
            });
    </script>
</body>
</html>
