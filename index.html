<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check PHP.bot Accessibility</title>
</head>
<body>
    <h1>Checking PHP.bot Accessibility</h1>
    <p id="status">Loading...</p>

    <script>
        fetch('/PHP.bot')
            .then(response => {
                if (response.ok) {
                    document.getElementById('status').textContent = 'PHP.bot is accessible.';
                } else {
                    document.getElementById('status').textContent = 'PHP.bot inaccessible (status: ' + response.status + ').';
                }
            })
            .catch(error => {
                document.getElementById('status').textContent = 'PHP.bot inaccessible (error: ' + error.message + ').';
            });
    </script>
</body>
</html>
